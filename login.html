<!DOCTYPE html>
<html>
<head>
<title>Login / Register - MedSchedule</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
overflow:hidden;
}

.bg1,.bg2{
position:fixed;
border-radius:50%;
filter:blur(100px);
z-index:-1;
}

.bg1{
width:350px;
height:350px;
background:#00c6ff;
top:-100px;
left:-100px;
}

.bg2{
width:350px;
height:350px;
background:#ff4ecd;
bottom:-100px;
right:-100px;
}

.container{
width:900px;
max-width:95%;
display:grid;
grid-template-columns:1fr 1fr;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:30px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

.left{
padding:50px;
background:rgba(0,0,0,0.25);
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:42px;
margin-bottom:20px;
}

.left p{
line-height:1.8;
opacity:0.9;
margin-bottom:25px;
}

.feature{
margin:12px 0;
font-weight:500;
}

.right{
padding:50px;
background:rgba(255,255,255,0.12);
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:20px;
}

.right h2{
font-size:34px;
margin-bottom:10px;
}

.sub{
opacity:0.85;
margin-bottom:30px;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-size:14px;
opacity:0.9;
}

.input-box input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
font-family:Poppins;
outline:none;
}

.buttons{
display:flex;
gap:12px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-family:Poppins;
}

.loginBtn{
background:#00c6ff;
color:white;
}

.registerBtn{
background:white;
color:#333;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.back{
margin-top:25px;
text-align:center;
}

.back a{
color:white;
text-decoration:none;
font-weight:600;
}

.msg{
margin-top:20px;
text-align:center;
font-weight:600;
}

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

.left{
display:none;
}

.right{
padding:35px;
}

}
</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

<div class="left">
<h1>Welcome to MedSchedule</h1>

<p>
Book doctor appointments faster, smarter, and securely with our premium healthcare platform.
</p>

<div class="feature">✅ Secure Login</div>
<div class="feature">✅ Smart Appointment Booking</div>
<div class="feature">✅ Doctor Availability</div>
<div class="feature">✅ Appointment History</div>
</div>

<div class="right">

<div class="logo">🏥 MedSchedule</div>

<h2>Login / Register</h2>

<p class="sub">Access your healthcare dashboard</p>

<div class="input-box">
<label>Username</label>
<input id="username" placeholder="Enter username">
</div>

<div class="input-box">
<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
</div>

<div class="buttons">
<button class="loginBtn" onclick="login()">Login</button>
<button class="registerBtn" onclick="register()">Register</button>
</div>

<div class="msg" id="msg"></div>

<div class="back">
<a href="index.html">← Back to Home</a>
</div>

</div>

</div>

<script>
async function register(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const msg = document.getElementById("msg");

if(!username || !password){
msg.innerText = "Please fill all fields";
return;
}

const res = await fetch("https://medschedule-backend-kwtn.onrender.com/auth/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
});

const data = await res.json();

msg.innerText = data.message;

}

async function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const msg = document.getElementById("msg");

if(!username || !password){
msg.innerText = "Please fill all fields";
return;
}

const res = await fetch("https://medschedule-backend-kwtn.onrender.com/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
});

const data = await res.json();

if(data.token){

localStorage.setItem("token",data.token);

msg.innerText = "Login successful ✅";

setTimeout(()=>{

location = "index.html";

},800);

}else{

msg.innerText = data.message || "Login failed";

}

}
</script>

</body>
</html>
