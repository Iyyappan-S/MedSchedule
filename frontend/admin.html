<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#111827,#4f46e5);
color:white;
}

.nav{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
}

button{
border:none;
border-radius:10px;
padding:10px 14px;
cursor:pointer;
font-weight:600;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
}

.box{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.box h2{
font-size:35px;
}

.table-wrap{
padding:30px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:#222;
border-radius:15px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#4f46e5;
color:white;
}

select{
padding:8px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">
<h1>📊 Admin Dashboard</h1>
<div>
<button onclick="location='index.html'">Home</button>
</div>
</div>

<div class="stats">
<div class="box"><h2 id="users">0</h2><p>Users</p></div>
<div class="box"><h2 id="appointments">0</h2><p>Total Appointments</p></div>
<div class="box"><h2 id="pending">0</h2><p>Pending</p></div>
<div class="box"><h2 id="confirmed">0</h2><p>Confirmed</p></div>
<div class="box"><h2 id="completed">0</h2><p>Completed</p></div>
<div class="box"><h2 id="cancelled">0</h2><p>Cancelled</p></div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Patient</th>
<th>Email</th>
<th>Phone</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

const token = localStorage.getItem("token");

if(!token){
alert("Admin login required");
location = "login.html";
}

const user = JSON.parse(atob(token.split(".")[1]));

if(user.role !== "admin"){
alert("Admin only");
location = "index.html";
}

async function loadStats(){

const res = await fetch("http://localhost:5000/admin/stats",{
headers:{
"Authorization":"Bearer " + token
}
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Admin access denied");
location = "index.html";
return;
}

document.getElementById("users").innerText = data.users;
document.getElementById("appointments").innerText = data.appointments;
document.getElementById("pending").innerText = data.pending;
document.getElementById("confirmed").innerText = data.confirmed;
document.getElementById("completed").innerText = data.completed;
document.getElementById("cancelled").innerText = data.cancelled;

}

async function loadAppointments(){

const res = await fetch("http://localhost:5000/admin/appointments",{
headers:{
"Authorization":"Bearer " + token
}
});

const data = await res.json();

if(!Array.isArray(data)){
console.log(data);
document.getElementById("tbody").innerHTML = `
<tr>
<td colspan="7">No appointments or admin access denied</td>
</tr>
`;
return;
}

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

data.forEach(a=>{

tbody.innerHTML += `
<tr>
<td>${a.name || "-"}</td>
<td>${a.email || "-"}</td>
<td>${a.phone || "-"}</td>
<td>${a.doctor || "-"}</td>
<td>${a.date || "-"}</td>
<td>${a.time || "-"}</td>
<td>
<select onchange="updateStatus('${a._id}',this.value)">
<option ${a.status==="Pending"?"selected":""}>Pending</option>
<option ${a.status==="Confirmed"?"selected":""}>Confirmed</option>
<option ${a.status==="Completed"?"selected":""}>Completed</option>
<option ${a.status==="Cancelled"?"selected":""}>Cancelled</option>
</select>
</td>
</tr>
`;

});

}

async function updateStatus(id,status){

await fetch(`http://localhost:5000/admin/appointments/${id}/status`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body:JSON.stringify({status})
});

alert("Status updated ✅");
loadStats();
loadAppointments();

}

loadStats();
loadAppointments();

</script>

</body>
</html>
